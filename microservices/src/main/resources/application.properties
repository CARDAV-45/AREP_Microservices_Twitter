# ===========================
# Aplicacion
# ===========================
spring.application.name=twitter-monolith
server.port=8080

# ===========================
# Base de datos H2
# ===========================
spring.datasource.url=jdbc:h2:mem:twitterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# Auth0 - OAuth2 Resource Server
# ===========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-ctb3u3ue5k6bs30k.us.auth0.com/
auth0.audience=https://twitter-api

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
